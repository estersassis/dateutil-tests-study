name: GitHub Classroom Workflow - Experimento Empírico

on: [push]

jobs:
  build:
    name: Autograding e Coleta de Métricas
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Garante o histórico completo de commits para cálculo de Lead Time

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Instalar Dependências do Experimento
      run: |
        python -m pip install --upgrade pip
        pip install pytest coverage

    - name: Executar Testes e Coletar Cobertura Real (M1)
      run: |
        # 1. Força a instalação do ambiente virtual no runner usando o Poetry para isolar as variáveis
        pip install poetry
        poetry config virtualenvs.create true
        poetry install --no-interaction --no-root
        
        # 2. Executa a cobertura usando estritamente o ambiente isolado do projeto
        poetry run coverage run --source=src/ -m pytest tests/test_relativedelta.py || true
        
        # 3. Gera os relatórios de saída
        poetry run coverage report -m > coverage_report.txt
        poetry run coverage json -o coverage_data.json

    - name: Calcular Lead Time Dinâmico (M2), Ciclos(M3) e Contar Testes/Asserções (M4)
      run: |
        echo "=== DADOS METODOLÓGICOS DO EXPERIMENTO ==="
        
        # 1. Identifica o nome da branch atual que disparou o workflow
        BRANCH_ATUAL=${{ github.ref_name }}
        
        # Se estivermos na main/master, olha o histórico local. Se for uma branch, filtra o log apenas dela em relação à main.
        if [ "$BRANCH_ATUAL" = "main" ] || [ "$BRANCH_ATUAL" = "master" ]; then
          COMMITS_ITERACAO=$(git log --format="%at" --grep="Iteration Status:")
        else
          # Garante que a main local está atualizada para servir de base para o delta
          git fetch origin main:main || git fetch origin master:master || true
          BASE_BRANCH=$(git show-ref --verify --quiet refs/heads/main && echo "main" || echo "master")
          
          # CAPTURA APENAS OS COMMITS DA BRANCH ATUAL (que não existem na main)
          COMMITS_ITERACAO=$(git log --format="%at" --grep="Iteration Status:" $BASE_BRANCH..HEAD)
        fi
        
        if [ -z "$COMMITS_ITERACAO" ]; then
          echo "Lead Time (M2): 0 minutos (Nenhum ciclo de teste executado nesta branch)."
          echo "Total de Iterações: 0"
        else
          # O primeiro commit da iteração na branch é o último da lista reversa
          FIRST_ITERATION_TS=$(echo "$COMMITS_ITERACAO" | tail -n 1)
          # O commit atual (último ciclo) é o primeiro da lista
          CURRENT_ITERATION_TS=$(echo "$COMMITS_ITERACAO" | head -n 1)
          
          DELTA_SECONDS=$((CURRENT_ITERATION_TS - FIRST_ITERATION_TS))
          LEAD_TIME_MINUTES=$(python3 -c "print(round($DELTA_SECONDS / 60, 2))")
          
          TOTAL_ITERACOES=$(echo "$COMMITS_ITERACAO" | wc -l)
          
          echo "Branch Avaliada: $BRANCH_ATUAL"
          echo "Primeira Iteração na Branch (Timestamp): $FIRST_ITERATION_TS"
          echo "Última Iteração na Branch (Timestamp): $CURRENT_ITERATION_TS"
          echo "Total de Ciclos nesta Branch (Tentativa/Erro) (M3): $TOTAL_ITERACOES"
          echo "Lead Time Real da Tarefa (M2): $LEAD_TIME_MINUTES minutos"
        fi
        
        # 2. Contagem Estática de Asserções/Testes (M4)
        if [ -f "tests/test_relativedelta.py" ]; then
          TEST_COUNT=$(grep -o "def test_" tests/test_relativedelta.py | wc -l)
          ASSERT_COUNT=$(grep -o "assert " tests/test_relativedelta.py | wc -l)
          echo "Granularidade e Densidade (M4 - Testes/Asserções): $TEST_COUNT/$ASSERT_COUNT"
        else
          echo "Granularidade e Densidade (M4 - Testes/Asserções): 0/0 (Arquivo de teste não encontrado)"
        fi
        echo "=========================================="

    - name: Salvar Artefatos de Pesquisa (Ocultos para o Usuário)
      uses: actions/upload-artifact@v4
      with:
        name: metricas-experimento-${{ github.sha }}
        path: |
          coverage_report.txt
          coverage_data.json
        if-no-files-found: error