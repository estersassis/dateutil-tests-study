name: GitHub Classroom Workflow - Experimento Empírico

on: [push]

jobs:
  build:
    name: Autograding e Coleta de Métricas
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Garante o histórico completo de commits para cálculo de Lead Time

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Instalar Dependências do Experimento
      run: |
        python -m pip install --upgrade pip
        pip install pytest coverage

    - name: Executar Testes e Coletar Cobertura Real (M1)
      run: |
        # Executa a cobertura real de forma oculta no servidor
        coverage run --source=src/ -m pytest tests/test_relativedelta.py || true
        coverage report -m > cobertura_relativedelta.txt
        coverage json -o cobertura_dados.json

    - name: Calcular Lead Time (M2) e Contar Asserções (M3)
      run: |
        # Script rápido para cuspir metadados de tempo do Git no log do CI
        echo "=== DADOS METODOLÓGICOS ==="
        echo "Primeiro Commit: $(git log --reverse --format="%at" | head -n 1)"
        echo "Commit Atual: $(git log -1 --format="%at")"
        echo "Total de Commits: $(git rev-list --count HEAD)"
        
        # Conta a densidade de asserções (M3) de forma estática no arquivo de teste
        if [ -f "tests/test_relativedelta.py" ]; then
          echo "Quantidade de asserts: $(grep -o "assert " tests/test_relativedelta.py | wc -l)"
        else
          echo "Quantidade de asserts: 0 (Arquivo não criado)"
        fi
        echo "=========================="

    - name: Salvar Artefatos de Pesquisa (Ocultos para o Usuário)
      uses: actions/upload-artifact@v4
      with:
        name: metricas-experimento-${{ github.sha }}
        path: |
          ${{ github.workspace }}/coverage_report.txt
          ${{ github.workspace }}/coverage_data.json
        if-no-files-found: error